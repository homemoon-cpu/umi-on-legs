cfg:
  env:
    num_actions: 18
    num_observations: ???
  init_state:
    pos:
      - -0.5
      - 0.0
      - 0.3
  asset:
    name: go2piper
    file: "{LEGGED_GYM_ROOT_DIR}/resources/robots/go2_piper/go2_piper.urdf"
    terminate_after_contacts_on:
      - base
      - hip
      - Head
      - thigh
      - base_arm_link
      - link1
      - link2
      - link3
      - link4
      - link5
    self_collisions: 0
    collapse_fixed_joints: true
    flip_visual_attachments: true
    force_sensor_links:
      - FR_foot
      - FL_foot
      - RR_foot
      - RL_foot
  domain_rand:
    randomize_rigid_body_masses:
      - base
    added_mass_range:
      - -2.0
      - 2.0

constraints:
  joint_limit:
    joint_names:
      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint
      #
      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint
      #
      - RL_hip_joint
      - RL_thigh_joint
      - RL_calf_joint
      #
      - RR_hip_joint
      - RR_thigh_joint
      - RR_calf_joint
      #
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    lower:
      data:
        # Front Right
        - -1.0472 # hip
        - -1.5708 # thigh
        - -2.7227 # calf
        # Front Left
        - -1.0472 # hip
        - -1.5708 # thigh
        - -2.7227 # calf
        # Back Right
        - -1.0472 # hip
        - -0.5236 # thigh
        - -2.7227 # calf
        # Back Left
        - -1.0472 # hip
        - -0.5236 # thigh
        - -2.7227 # calf
        # Piper arm (matches URDF joint limits)
        - -2.618          # joint1
        - 0.0             # joint2
        - -2.967          # joint3
        - -1.745          # joint4
        - -1.22           # joint5
        - -2.0944         # joint6
    upper:
      data:
        # Front Right
        - 1.0472 # hip
        - 3.4907 # thigh
        - -0.83776 # calf
        # Front Left
        - 1.0472 # hip
        - 3.4907 # thigh
        - -0.83776 # calf
        # Back Right
        - 1.0472 # hip
        - 4.5379 # thigh
        - -0.83776 # calf
        # Back Left
        - 1.0472 # hip
        - 4.5379 # thigh
        - -0.83776 # calf
        # Piper arm (matches URDF joint limits)
        - 2.618           # joint1
        - 3.14            # joint2
        - 0.0             # joint3
        - 1.745           # joint4
        - 1.22            # joint5
        - 2.0944          # joint6
  collision:
    #
    link_names:
      - Head_lower
      - Head_upper
      - base
      - FR_hip
      - FR_thigh
      - FR_calf
      #
      - FL_hip
      - FL_thigh
      - FL_calf
      #
      - RR_hip
      - RR_thigh
      - RR_calf
      #
      - RL_hip
